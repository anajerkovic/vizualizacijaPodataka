<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <title>Zadatak 6: Linijski graf - Vremenska os</title>
  <style>
    .axis { font: 10px sans-serif; }
    .axis path, .axis line { fill: none; stroke: #000; shape-rendering: crispEdges; }
    .line { fill: none; stroke: steelblue; stroke-width: 2px; }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <script>
    // Generirani podatci s datumima
    var vremenskiPodaci = [
      { datum: new Date("2024-01-01"), vrijednost: 10 },
      { datum: new Date("2024-02-01"), vrijednost: 25 },
      { datum: new Date("2024-03-01"), vrijednost: 15 },
      { datum: new Date("2024-04-01"), vrijednost: 40 },
      { datum: new Date("2024-05-01"), vrijednost: 30 },
      { datum: new Date("2024-06-01"), vrijednost: 55 }
    ];

    var margin = { top: 30, bottom: 50, left: 50, right: 30 };
    var width = 600 - margin.left - margin.right;
    var height = 400 - margin.top - margin.bottom;

    // Upotreba d3.scaleTime() za X os
    var x = d3.scaleTime()
      .domain(d3.extent(vremenskiPodaci, function(d) { return d.datum; }))
      .range([0, width]);

    var y = d3.scaleLinear()
      .domain([0, d3.max(vremenskiPodaci, function(d) { return d.vrijednost; })])
      .range([height, 0]);

    var svg = d3.select("body").append("svg")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.bottom + margin.top)
      .append("g")
      .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

    // Formatiranje datuma na osi (npr. "%b" za skraćeni mjesec)
    var xAxis = d3.axisBottom(x).tickFormat(d3.timeFormat("%b %Y"));

    svg.append("g")
      .attr("class", "x axis")
      .attr("transform", "translate(0," + height + ")")
      .call(xAxis);

    svg.append("g")
      .attr("class", "y axis")
      .call(d3.axisLeft(y));

    // Generiranje linije
    var valueline = d3.line()
      .x(function(d) { return x(d.datum); })
      .y(function(d) { return y(d.vrijednost); });

    // Iscrtavanje putanje (path)
    svg.append("path")
      .data([vremenskiPodaci])
      .attr("class", "line")
      .attr("d", valueline);

  </script>
</body>
</html>
