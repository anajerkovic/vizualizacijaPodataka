<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Zadatak 5</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <svg width="800" height="800" style="border: 1px solid black; background: #050505;"></svg>
    <script>
        const svg = d3.select("svg");
        const cx = 400; // Centar X
        const cy = 400; // Centar Y

        // Podaci o svim planetima: Udaljenost (R), polumjer (r), relativna brzina, boja
        const planeti = [
            { ime: "Merkur",  R: 50,  r: 4,  brzina: 0.047, boja: "#A5A5A5" },
            { ime: "Venera",  R: 80,  r: 7,  brzina: 0.035, boja: "#E3BB76" },
            { ime: "Zemlja",  R: 120, r: 7.5,brzina: 0.029, boja: "#2271B3" },
            { ime: "Mars",    R: 160, r: 5,  brzina: 0.024, boja: "#E27B58" },
            { ime: "Jupiter", R: 230, r: 18, brzina: 0.013, boja: "#D39C7E" },
            { ime: "Saturn",  R: 300, r: 15, brzina: 0.009, boja: "#C5AB6E" },
            { ime: "Uran",    R: 350, r: 10, brzina: 0.006, boja: "#BBE1E4" },
            { ime: "Neptun",  R: 390, r: 10, brzina: 0.005, boja: "#6081FF" }
        ];

        const sustav = svg.append("g")
            .attr("transform", `translate(${cx}, ${cy})`);

        // Crtanje orbita
        sustav.selectAll(".orbita")
            .data(planeti)
            .enter()
            .append("circle")
            .attr("class", "orbita")
            .attr("r", d => d.R)
            .style("fill", "none")
            .style("stroke", "#333")
            .style("stroke-width", 1)
            .style("stroke-dasharray", "2,2");

        // Sunce
        sustav.append("circle")
            .attr("r", 30)
            .style("fill", "yellow");

        // Grupe za planete
        const planetiGrupe = sustav.selectAll(".planet-grupa")
            .data(planeti)
            .enter()
            .append("g");

        // Planeti
        planetiGrupe.append("circle")
            .attr("cx", d => d.R)
            .attr("cy", 0)
            .attr("r", d => d.r)
            .style("fill", d => d.boja);


        // Animacija
        d3.timer(function(elapsed) {
            planetiGrupe.attr("transform", d => `rotate(${elapsed * d.brzina})`);
        });
    </script>
</body>
</html>
