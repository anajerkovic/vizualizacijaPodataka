<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Zadatak 2</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <svg width="500" height="500" style="border: 1px solid black;"></svg>
    <script>
        const svg = d3.select("svg");
        const w = +svg.attr("width");
        const h = +svg.attr("height");

        function animirajKvadrat(selection) {
            selection.each(function() {
                const rect = d3.select(this);
                // Slučajni početni parametri
                const pocetnaVelicina = 20 + Math.random() * 40;
                const startX = Math.random() * (w - pocetnaVelicina);
                const startY = Math.random() * (h - pocetnaVelicina);
                const delayT = Math.random() * 3000; 
                const fillT = 1000 + Math.random() * 4000;
                const fadeT = 1000 + Math.random() * 2000;

                rect.attr("x", startX)
                    .attr("y", startY)
                    .attr("width", pocetnaVelicina)
                    .attr("height", pocetnaVelicina)
                    .style("fill", "none")
                    .style("stroke", d3.interpolateRainbow(Math.random()))
                    .style("stroke-width", 2)
                    .style("opacity", 1)
                    .transition()
                    .delay(delayT)
                    .duration(fillT)
                    .style("fill", d3.interpolateRainbow(Math.random()))
                    .transition()
                    .duration(fadeT)
                    .attr("width", w / 2)
                    .attr("height", w / 2)
                    .style("opacity", 0)
                    .on("end", function() {
                        // Ponovni poziv nakon završetka
                        d3.select(this).call(animirajKvadrat);
                    });
            });
        }

        svg.selectAll("rect")
            .data(d3.range(10)) // 10 kvadrata
            .enter()
            .append("rect")
            .call(animirajKvadrat);
    </script>
</body>
</html>
