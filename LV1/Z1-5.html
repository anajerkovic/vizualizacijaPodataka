<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <title>Z1-5</title>
</head>
<body>
    <script>
        const svg = d3.select("body").append("svg").attr("width", 500).attr("height", 300);
        const krugovi = [
            {x: 100, y: 100, c: "blue"}, {x: 200, y: 100, c: "black"}, {x: 300, y: 100, c: "red"},
            {x: 150, y: 150, c: "yellow"}, {x: 250, y: 150, c: "green"}
        ];

        svg.selectAll("circle")
            .data(krugovi)
            .enter()
            .append("circle")
            .attr("cx", d => d.x)
            .attr("cy", d => d.y)
            .attr("r", 45)
            .style("fill", "none")
            .style("stroke", d => d.c)
            .style("stroke-width", 5); 
    </script>
</body>
</html>
