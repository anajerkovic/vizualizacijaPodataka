<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body>
    <svg width="800" height="600" style="border:1px solid #ccc"></svg>
    <script>
        const svg = d3.select("svg");
        const g = svg.append("g");

        // Definiranje zoom-a
        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", (event) => g.attr("transform", event.transform));

        svg.call(zoom);

        d3.json("cro.json").then(data => {
            const counties = topojson.feature(data, data.objects.layer1);
            const projection = d3.geoMercator().fitSize([800, 600], counties);
            const path = d3.geoPath().projection(projection);

            g.selectAll("path")
                .data(counties.features)
                .enter().append("path")
                .attr("d", path)
                .attr("fill", "#69b3a2")
                .attr("stroke", "white");
        });
    </script>
</body>
</html>
