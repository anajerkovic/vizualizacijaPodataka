<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        #details { position: fixed; top: 20px; left: 20px; background: white; padding: 10px; border: 2px solid blue; display: none; }
    </style>
</head>
<body>
    <div id="details"></div>
    <svg width="800" height="600"></svg>
    <script>
        const width = 800, height = 600;
        const svg = d3.select("svg");
        const g = svg.append("g");
        const zoom = d3.zoom().on("zoom", (e) => g.attr("transform", e.transform));

        d3.json("cro.json").then(data => {
            const counties = topojson.feature(data, data.objects.layer1);
            const projection = d3.geoMercator().fitSize([width, height], counties);
            const path = d3.geoPath().projection(projection);

            g.selectAll("path")
                .data(counties.features)
                .enter().append("path")
                .attr("d", path)
                .attr("fill", "#4CAF50")
                .attr("stroke", "#fff")
                .on("click", function(event, d) {
                    // Prikaz podataka
                    const detailDiv = d3.select("#details");
                    detailDiv.style("display", "block").html(
                        `<b>${d.properties.name}</b><br>Župan: ${d.properties.mayor}<br>Površina: ${d.properties.area} km2`
                    );

                    // Zoom na županiju
                    const bounds = path.bounds(d);
                    const x = (bounds[0][0] + bounds[1][0]) / 2;
                    const y = (bounds[0][1] + bounds[1][1]) / 2;
                    const scale = 4;
                    const translate = [width / 2 - scale * x, height / 2 - scale * y];

                    svg.transition().duration(750).call(
                        zoom.transform, 
                        d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
                    );

                    // Povratak nakon 10 sekundi
                    setTimeout(() => {
                        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
                        detailDiv.style("display", "none");
                    }, 10000);
                });
        });
    </script>
</body>
</html>
