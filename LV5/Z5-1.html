<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        .county { fill: #ccc; stroke: #fff; }
        .county:hover { fill: orange; }
        #tooltip {
            position: absolute;
            background: white;
            border: 1px solid #333;
            padding: 5px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="tooltip"></div>
    <svg width="800" height="600"></svg>
    <script>
        const svg = d3.select("svg");
        const tooltip = d3.select("#tooltip");

        d3.json("./cro.json").then(data => {
            const counties = topojson.feature(data, data.objects.layer1);
            const projection = d3.geoMercator().fitSize([800, 600], counties);
            const path = d3.geoPath().projection(projection);

            svg.selectAll("path")
                .data(counties.features)
                .enter().append("path")
                .attr("class", "county")
                .attr("d", path)
                .on("mouseover", (event, d) => {
                    tooltip.style("opacity", 1).text(d.properties.name);
                })
                .on("mousemove", (event) => {
                    tooltip.style("left", (event.pageX + 10) + "px")
                           .style("top", (event.pageY - 20) + "px");
                })
                .on("mouseout", () => tooltip.style("opacity", 0));
        });
    </script>
</body>
</html>
