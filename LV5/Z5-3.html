<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body>
    <div id="info" style="height: 30px; font-weight: bold;">Klikni na županiju za broj stanovnika</div>
    <svg width="800" height="600"></svg>
    <script>
        const svg = d3.select("svg");
        d3.json("cro.json").then(data => {
            const counties = topojson.feature(data, data.objects.layer1);
            const projection = d3.geoMercator().fitSize([800, 600], counties);
            const path = d3.geoPath().projection(projection);

            // Skala boja na temelju populacije
            const maxPop = d3.max(counties.features, d => d.properties.population);
            const colorScale = d3.scaleSequential(d3.interpolateBlues).domain([0, maxPop]);

            svg.selectAll("path")
                .data(counties.features)
                .enter().append("path")
                .attr("d", path)
                .attr("fill", d => colorScale(d.properties.population))
                .attr("stroke", "#fff")
                .on("click", (event, d) => {
                    d3.select("#info").text(`${d.properties.name}: ${d.properties.population} stanovnika`);
                });
        });
    </script>
</body>
</html>
